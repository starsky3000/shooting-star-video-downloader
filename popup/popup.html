<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Shooting Star Download</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div id="mainContent">
      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <div class="loading-text" data-i18n="status_loading_video">正在获取视频信息...</div>
      </div>

      <!-- Setup Section (shown when native host is not registered) -->
      <div class="setup-section" id="setupSection" style="display: none;">
        <div class="setup-icon">&#9888;</div>
        <h2 class="setup-title" data-i18n="setup_title">首次使用需要安装开源软件</h2>
        <p class="setup-desc" data-i18n="setup_desc">扩展需要配置 JSON、Native Host 并安装开源软件 yt-dlp、ffmpeg。</p>
        <p class="setup-desc"><span data-i18n="setup_desc2">请依次下载以下两个文件，然后在</span><span id="setupTerminalName">终端</span><span data-i18n="setup_terminal_paste">中粘贴以下命令并按回车运行：</span></p>
        <button id="downloadScriptBtn" class="download-script-btn" data-i18n="btn_download_script">1. 下载 stardownload.py</button>
        <button id="downloadInstallBtn" class="install-script-btn" data-i18n="btn_install_script_mac">2. 下载 install.sh</button>
        <p class="setup-desc"><span data-i18n="setup_desc2">然后在</span><span id="setupTerminalName2">终端</span><span data-i18n="setup_terminal_paste">中粘贴以下命令并按回车运行：</span></p>
        <div class="run-command-row">
          <code id="setupCommandDisplay">bash ~/Downloads/install.sh</code>
          <button id="copyRunCmdBtn" class="copy-cmd-btn" data-i18n="btn_copy">复制</button>
        </div>
        <div class="setup-desc" id="setupDownloadHint">下载到 ~/Downloads</div>
        <div class="setup-hint" id="setupHint"></div>
      </div>

      <!-- Current Video Section (hidden until ready) -->
      <div class="current-video" id="currentVideo" style="display: none;">
        <div class="video-info" id="videoInfo">
          <div class="thumbnail-wrapper">
            <img id="thumbnail" class="thumbnail" alt="Video thumbnail">
            <div class="duration-badge" id="durationBadge">--:--</div>
          </div>
          <div class="video-details">
            <h2 id="videoTitle" class="video-title" data-i18n="status_loading_video">加载中...</h2>
          </div>
        </div>

        <!-- Download Section -->
        <div class="download-section">
          <div class="quality-selector">
            <label for="qualitySelect" data-i18n="label_quality">画质：</label>
            <select id="qualitySelect">
              <option value="loading" data-i18n="status_loading_formats">获取画质信息中，请稍等...</option>
            </select>
          </div>

          <!-- Unified download bar area -->
          <div class="download-bar-area" id="downloadBarArea">
            <button id="downloadBtn" class="download-btn" style="display: none;">
              <span id="btnText" data-i18n="btn_download">下载</span>
            </button>

            <div class="thick-progress" id="thickProgress" style="display: none;">
              <div class="thick-progress-fill" id="thickProgressFill"></div>
              <div class="thick-progress-label" id="thickProgressLabel">0%</div>
              <div class="thick-progress-controls" id="thickProgressControls">
                <button class="progress-icon-btn" id="progressPauseBtn" data-i18n-title="btn_pause" title="暂停">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="progress-icon-btn" id="progressCancelBtn" data-i18n-title="btn_cancel" title="取消下载">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </div>
            </div>

            <div class="download-completed" id="downloadCompleted" style="display: none;">
              <button class="re-download-btn" id="refreshBtn" data-i18n="btn_redownload">重新下载</button>
            </div>
          </div>
        </div>

        <div class="status-text" id="statusText"></div>

        <!-- Completion Section -->
        <div class="completion-section" id="completionSection" style="display: none;">
          <div class="success-message">
            <span class="checkmark">&#10003;</span>
            <span id="successText" data-i18n="status_download_complete">下载完成！</span>
          </div>
          <div class="file-path" id="filePath"></div>
          <div class="action-buttons">
            <button id="playBtn" class="action-btn play-btn" data-i18n="btn_play_video">播放视频</button>
            <button id="openFolderBtn" class="action-btn folder-btn" data-i18n="btn_open_folder">打开文件夹</button>
          </div>
        </div>

        <!-- Error Section -->
        <div class="error-section" id="errorSection" style="display: none;">
          <div class="error-message" id="errorMessage"></div>
          <button id="retryBtn" class="retry-btn" data-i18n="btn_retry">重试</button>
        </div>
      </div>

      <!-- Downloaded Videos Section -->
      <div class="downloaded-section" id="downloadedSection">
        <div class="section-header">
          <h3 class="section-title" id="downloadedTitle" data-i18n="downloaded_title">已下载</h3>
          <button class="more-menu-btn" id="moreMenuBtn">...</button>
          <div class="more-menu-dropdown" id="moreMenuDropdown" style="display: none;">
            <div class="more-menu-item" id="clearAllHistory" data-i18n="btn_clear_history">删除全部下载历史</div>
          </div>
        </div>
        <div class="downloaded-list" id="downloadedList">
          <!-- Downloaded items will be inserted here -->
        </div>
        <div class="show-more-wrap" id="showMoreWrap" style="display: none;">
          <button class="show-more-btn" id="showMoreBtn" data-i18n="btn_show_all">查看全部</button>
        </div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel" style="display: none;">
      <div class="settings-header">
        <button class="back-btn" id="settingsBackBtn" data-i18n-title="btn_back" title="返回">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="settings-page-title" data-i18n="settings_title">设置</span>
      </div>
      <div class="settings-item">
        <span class="settings-label" data-i18n="settings_version">版本号</span>
        <span class="settings-value" id="settingsVersion">v1.0.0</span>
      </div>
      <div class="settings-item">
        <span class="settings-label" data-i18n="settings_language">语言</span>
        <select id="languageSelect">
          <option value="zh_CN">简体中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <!-- Bottom Bar -->
    <footer class="bottom-bar">
      <span class="app-name" data-i18n="app_name">流星视频下载</span>
      <button class="settings-btn" id="settingsBtn" data-i18n-title="btn_settings" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1l2.4 4.8 5.3.9-3.8 3.8.9 5.3L12 14l-4.8 1.8.9-5.3-3.8-3.8 5.3-.9z"/></svg>
      </button>
    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
