<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Shooting Star Download</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在获取视频信息...</div>
    </div>

    <!-- Setup Section (shown when native host is not registered) -->
    <div class="setup-section" id="setupSection" style="display: none;">
      <div class="setup-icon">&#9888;</div>
      <h2 class="setup-title">首次使用需要安装</h2>
      <p class="setup-desc">扩展需要配置 JSON、Native Host 并安装 yt-dlp、ffmpeg。</p>
      <p class="setup-desc">请依次下载以下两个文件，然后在<span id="setupTerminalName">终端</span>运行安装脚本：</p>
      <button id="downloadScriptBtn" class="download-script-btn">1. 下载 stardownload.py</button>
      <button id="downloadInstallBtn" class="install-script-btn">2. 下载 install.sh</button>
      <p class="setup-desc">然后在<span id="setupTerminalName2">终端</span>中运行：</p>
      <div class="run-command-row">
        <code id="setupCommandDisplay">bash ~/Downloads/install.sh</code>
        <button id="copyRunCmdBtn" class="copy-cmd-btn">复制</button>
      </div>
      <div class="setup-desc" id="setupDownloadHint">下载到 ~/Downloads</div>
      <div class="setup-hint" id="setupHint"></div>
    </div>

    <!-- Current Video Section (hidden until ready) -->
    <div class="current-video" id="currentVideo" style="display: none;">
      <div class="video-info" id="videoInfo">
        <div class="thumbnail-wrapper">
          <img id="thumbnail" class="thumbnail" alt="Video thumbnail">
          <div class="duration-badge" id="durationBadge">--:--</div>
        </div>
        <div class="video-details">
          <h2 id="videoTitle" class="video-title">加载中...</h2>
        </div>
      </div>

      <!-- Download Section -->
      <div class="download-section">
        <div class="quality-selector">
          <label for="qualitySelect">画质：</label>
          <select id="qualitySelect">
            <option value="loading">获取画质信息中，请稍等...</option>
          </select>
        </div>

        <button id="downloadBtn" class="download-btn">
          <span id="btnText">下载</span>
        </button>

        <!-- Pause/Cancel actions (shown during download) -->
        <div class="download-actions" id="downloadActions" style="display: none;">
          <button id="pauseBtn" class="download-action-btn pause-btn">
            <span id="pauseBtnText">暂停</span>
          </button>
          <button id="cancelBtn" class="download-action-btn cancel-btn">取消</button>
        </div>
      </div>

      <!-- Progress Section -->
      <div class="progress-section" id="progressSection">
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText"></div>
      </div>

      <!-- Completion Section -->
      <div class="completion-section" id="completionSection" style="display: none;">
        <div class="success-message">
          <span class="checkmark">&#10003;</span>
          <span id="successText">下载完成！</span>
        </div>
        <div class="file-path" id="filePath"></div>
        <div class="action-buttons">
          <button id="playBtn" class="action-btn play-btn">播放视频</button>
          <button id="openFolderBtn" class="action-btn folder-btn">打开文件夹</button>
        </div>
      </div>

      <!-- Error Section -->
      <div class="error-section" id="errorSection" style="display: none;">
        <div class="error-message" id="errorMessage"></div>
        <button id="retryBtn" class="retry-btn">重试</button>
      </div>
    </div>

    <!-- Downloaded Videos Section -->
    <div class="downloaded-section" id="downloadedSection">
      <div class="section-header">
        <h3 class="section-title" id="downloadedTitle">已下载</h3>
        <button class="more-menu-btn" id="moreMenuBtn">...</button>
        <div class="more-menu-dropdown" id="moreMenuDropdown" style="display: none;">
          <div class="more-menu-item" id="clearAllHistory">删除全部下载历史</div>
        </div>
      </div>
      <div class="downloaded-list" id="downloadedList">
        <!-- Downloaded items will be inserted here -->
      </div>
      <div class="show-more-wrap" id="showMoreWrap" style="display: none;">
        <button class="show-more-btn" id="showMoreBtn">查看更多</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
